appId: com.mimo.desktop
productName: Mimo Desktop
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - '!node_modules/**/*'
asar: true
publish:
  provider: github
  owner: mimo-ai
  repo: mimo-desktop
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mimo Desktop
